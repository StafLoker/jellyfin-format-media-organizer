name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  release:
    needs: ci
    timeout-minutes: 15
    runs-on: ubuntu-latest
    environment:
      name: pypi
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$GITHUB_REF_NAME" >> $GITHUB_OUTPUT

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        run: uv publish

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/jfmo:latest
            ghcr.io/${{ github.repository_owner }}/jfmo:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "${{ steps.version.outputs.tag }}"
          generate_release_notes: true
          body: |
            # JFMO ${{ steps.version.outputs.tag }}
            
            ## 📦 Install with pipx

            ### 📦 Latest
            ```bash
            sudo pipx install jfmo --global
            ```

            ### 🏷 Versioned
            ```bash
            sudo pipx install jfmo==${{ steps.version.outputs.version }} --global
            ```
            --- 
            ## 🐳 Docker Images

            ### 📦 Latest
            ```bash
            docker pull ghcr.io/${{ github.repository_owner }}/jfmo:latest
            ```

            ### 🏷 Versioned
            ```bash
            docker pull ghcr.io/${{ github.repository_owner }}/jfmo:${{ steps.version.outputs.version }}
            ````
          files: dist/*
