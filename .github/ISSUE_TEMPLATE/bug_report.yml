name: Bug report
description: Something is not working as expected
title: "[Bug]: "
labels: [bug, triage]
body:
  - type: checkboxes
    id: existing
    attributes:
      label: Is there an existing issue for this?
      description: Please search [existing issues](https://github.com/StafLoker/jellyfin-format-media-organizer/issues) before creating a new one.
      options:
        - label: I have searched the existing issues
          required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Create a file named `Movie.2024.1080p.mkv`
        2. Run `jfmo /downloads /media`
        3. Expected the file to be linked as `Movie (2024) [1080p].mkv`
        4. Instead got `...`
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead? Include any error output or logs.
      render: shell
    validations:
      required: true

  - type: dropdown
    id: install-method
    attributes:
      label: Installation method
      options:
        - pip / uv (PyPI)
        - Docker
        - From source
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: JFMO version
      description: Run `jfmo --version` to find out.
      placeholder: "3.0.0"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      description: Run `python --version` to find out.
      placeholder: "3.12.2"
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Configuration
      description: Paste your `config.yml` if relevant (remove any sensitive data like API keys).
      render: yaml

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Anything else? Log files, screenshots, related issues.
